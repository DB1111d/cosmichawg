<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Hawg</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Special+Elite&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --cream: #f5edd6; --rust: #c1440e; --mustard: #d4a017; --brown: #3b1f0a; --tan: #b8935a; --dark: #1a0d02; --pink: #e8826a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background-color: var(--cream); color: var(--brown); font-family: 'Josefin Sans', sans-serif; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: var(--dark); border-bottom: 3px solid var(--mustard); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--mustard); letter-spacing: 2px; text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-family: 'Special Elite', cursive; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; color: var(--cream); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--mustard); }
  .nav-shows { }
  .hero { min-height: unset; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: var(--dark); overflow: hidden; padding: 160px 2rem 160px; }
  .hero-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .ring { position: absolute; border-radius: 50%; border: 1px solid; opacity: 0.12; animation: spin linear infinite; }
  .ring:nth-child(1) { width: 500px; height: 500px; border-color: var(--mustard); animation-duration: 40s; }
  .ring:nth-child(2) { width: 700px; height: 700px; border-color: var(--rust); animation-duration: 60s; animation-direction: reverse; }
  .ring:nth-child(3) { width: 900px; height: 900px; border-color: var(--tan); animation-duration: 80s; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .hero-star { position: absolute; background: var(--mustard); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); opacity: 0.08; }
  .hero-star:nth-child(4) { width: 300px; height: 300px; top: 10%; left: 5%; }
  .hero-star:nth-child(5) { width: 180px; height: 180px; bottom: 15%; right: 8%; }
  .hero-content { position: relative; text-align: center; z-index: 2; animation: fadeUp 1s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  .hero-eyebrow { font-family: 'Special Elite', cursive; font-size: 1.5rem; letter-spacing: 8px; color: var(--mustard); text-transform: uppercase; margin-bottom: 1rem; text-align: center; width: 100%; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(5rem, 12vw, 10rem); font-weight: 900; line-height: 0.9; color: var(--cream); display: block; }
  .hero-title .cosmic { display: block; color: var(--mustard); font-style: italic; }
  .hero-title .hawg { display: block; -webkit-text-stroke: 2px var(--cream); color: transparent; }
  .hero-tagline { font-family: 'Special Elite', cursive; font-size: 1.8rem; letter-spacing: 4px; color: #ffffff; margin-top: 3.5rem; text-align: center; width: 100%; }
  .hero-cta { margin-top: 3rem; display: flex; gap: 1.5rem; justify-content: center; }
  .btn { font-family: 'Special Elite', cursive; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; padding: 0.9rem 2.5rem; text-decoration: none; border: 2px solid; transition: all 0.25s; cursor: pointer; display: inline-block; }
  .btn-primary { background: var(--mustard); border-color: var(--mustard); color: var(--dark); }
  .btn-primary:hover { background: var(--rust); border-color: var(--rust); color: var(--cream); }
  .btn-outline { background: transparent; border-color: var(--cream); color: var(--cream); }
  .btn-outline:hover { background: var(--cream); color: var(--dark); }
  .hero-social-links { display: flex; justify-content: center; gap: 2rem; margin-top: 2rem; }
  .hero-social-link { color: #ffffff; text-decoration: none; transition: color 0.2s; display: flex; align-items: center; }
  .hero-social-link svg { width: 54px; height: 54px; }
  .hero-social-link:hover { color: var(--mustard); }
  .section-label { font-family: 'Special Elite', cursive; font-size: 0.75rem; letter-spacing: 6px; text-transform: uppercase; color: var(--rust); margin-bottom: 1rem; display: block; text-align: center; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; line-height: 1.1; color: var(--brown); margin-bottom: 2rem; }
  .divider { width: 80px; height: 4px; background: var(--mustard); margin-bottom: 3rem; }
  .music-section { background: var(--dark); color: var(--cream); }
  .music-inner { max-width: 1200px; margin: 0 auto; }
  .music-section .section-title { color: var(--cream); }
  .music-section .section-label { color: var(--mustard); }
  .albums-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 3rem; }
  .album-art { aspect-ratio: 1; position: relative; overflow: hidden; }
  .album-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; transition: transform 0.4s; }
  .album-card:hover .album-bg { transform: scale(1.05); }
  .album-card:nth-child(1) .album-bg { background: linear-gradient(135deg, #8B2500, #c1440e); }
  .album-card:nth-child(2) .album-bg { background: linear-gradient(135deg, #3b1f0a, #b8935a); }
  .album-card:nth-child(3) .album-bg { background: linear-gradient(135deg, #1a0d02, #d4a017); }
  .album-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
  .album-card:hover .album-overlay { opacity: 1; }
  .play-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--mustard); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--dark); }
  .album-info { padding: 1.2rem 0; }
  .album-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--cream); margin-bottom: 0.3rem; }
  .album-year { font-family: 'Special Elite', cursive; font-size: 0.75rem; letter-spacing: 3px; color: var(--mustard); }
  .shows-tabs-wrap { display: flex; justify-content: center; margin-bottom: 2rem; }
  .shows-tabs { display: inline-flex; gap: 1.2rem; border-bottom: none; }
  .tab-btn { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; background: none; border: none; cursor: pointer; padding: 0.75rem 0 0.6rem 0; color: var(--brown); opacity: 0.85; transition: all 0.2s; border-bottom: none; }
  .tab-btn span { text-decoration: underline; text-decoration-color: var(--mustard); text-decoration-thickness: 3px; text-underline-offset: 14px; }
  .tab-btn.active { opacity: 1; color: var(--rust); }
  .tab-btn.active span { text-decoration-color: var(--rust); }
  .shows-panel { display: none; }
  .shows-panel.active { display: block; }
  .no-shows { font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: 3px; color: var(--brown); padding: 3rem 0; text-align: center; border-top: 1px solid rgba(59,31,10,0.15); border-bottom: 1px solid rgba(59,31,10,0.15); }
  .tour-list { display: flex; flex-direction: column; }
  .tour-item { display: grid; grid-template-columns: 80px 1fr auto; align-items: center; gap: 1.5rem; padding: 1.5rem 0; border-bottom: 1px solid rgba(59,31,10,0.15); }
  .tour-item:first-child { border-top: 1px solid rgba(59,31,10,0.15); }
  .tour-date-box { text-align: center; background: var(--dark); padding: 0.8rem; }
  .tour-month { font-family: 'Special Elite', cursive; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--mustard); }
  .tour-day { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--cream); line-height: 1; }
  .tour-year { font-family: 'Special Elite', cursive; font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.6); margin-top: 0.45rem; display: block; }
  .tour-venue { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--brown); margin-bottom: 0.3rem; }
  .tour-city { font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: 2px; color: var(--brown); }
  .tour-ticket-btn { font-family: 'Special Elite', cursive; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; padding: 0.6rem 1.2rem; background: transparent; border: 2px solid var(--rust); color: var(--rust); cursor: pointer; transition: all 0.2s; text-decoration: none; white-space: nowrap; }
  .tour-ticket-btn:hover { background: var(--rust); color: var(--cream); }
  .past-label { font-family: 'Special Elite', cursive; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--tan); opacity: 0.55; white-space: nowrap; }
  .tour-item.past .tour-date-box { background: #2a1a08; }
  .tour-item.past .tour-venue { opacity: 0.85; }
  .contact-section { background: var(--dark); position: relative; overflow: hidden; }
  .contact-inner { max-width: 700px; margin: 0 auto; text-align: center; position: relative; }
  .contact-section .section-label { color: var(--mustard); }
  .contact-section .section-title { color: var(--cream); }
  .contact-section .divider { margin: 0 auto 3rem; }
  .contact-form { display: flex; flex-direction: column; gap: 1.2rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  .form-input, .form-textarea { width: 100%; background: rgba(245,237,214,0.05); border: 1px solid rgba(212,160,23,0.3); color: var(--cream); padding: 1rem 1.2rem; font-family: 'Josefin Sans', sans-serif; font-size: 0.9rem; letter-spacing: 1px; outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-textarea:focus { border-color: var(--mustard); }
  .form-textarea { resize: vertical; min-height: 140px; }
  .form-submit { background: var(--mustard); border: none; color: var(--dark); font-family: 'Special Elite', cursive; font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; padding: 1.1rem 3rem; cursor: pointer; transition: background 0.2s; align-self: center; }
  .form-submit:hover { background: var(--rust); color: var(--cream); }
  .social-links { display: flex; justify-content: center; gap: 2rem; margin-top: 4rem; padding-top: 3rem; border-top: 1px solid rgba(212,160,23,0.2); }
  .social-link { color: var(--tan); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; }
  .social-link:hover { color: var(--mustard); }
  footer { background: #0e0702; padding: 2rem 3rem; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 0.5rem; text-align: center; border-top: 3px solid var(--mustard); }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; color: var(--mustard); font-style: italic; }
  .footer-copy { font-family: 'Special Elite', cursive; font-size: 0.7rem; letter-spacing: 2px; color: rgba(245,237,214,0.3); }
  .video-wrap { position: relative; width: 100%; max-width: 900px; margin: 0 auto; }
  .video-wrap #yt-facade { width: 100%; }
  .video-wrap #yt-iframe-wrap { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .yt-thumb { display: block; position: relative; max-width: 900px; margin: 0 auto; cursor: pointer; }
  .yt-thumb img { width: 100%; height: auto; display: block; }
  .yt-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: rgba(255,0,0,0.85); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; padding-left: 6px; transition: background 0.2s; }
  .yt-thumb:hover .yt-play { background: rgba(255,0,0,1); }
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .upcoming-list .tour-item { grid-template-columns: 80px 1fr; }
  .pagination { display: flex; justify-content: center; gap: 0.6rem; margin-top: 1.8rem; }
  .page-btn { font-family: 'Special Elite', cursive; font-size: 0.8rem; letter-spacing: 2px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; border: 2px solid var(--brown); color: var(--brown); cursor: pointer; transition: all 0.2s; }
  .page-btn:hover { background: var(--brown); color: var(--cream); }
  .page-btn.active { background: var(--rust); border-color: var(--rust); color: var(--cream); }

  @media (max-width: 768px) {
    /* About image */
    .about-img { height: 700px; object-fit: cover; object-position: center; margin-top: -40px; }

    /* Nav */
    nav { padding: 0.9rem 1.2rem; }
    .nav-logo { font-size: 1.1rem; }
    .nav-links { gap: 1rem; }
    .nav-links a { font-size: 0.75rem; letter-spacing: 2px; }

    /* Hero */
    .hero { padding: 120px 1.5rem 1rem; }
    .hero-title { font-size: clamp(4.5rem, 22vw, 7rem); }
    .hero-content { margin-top: 4rem; }
    .hero-title .hawg { -webkit-text-stroke: 1.5px var(--cream); }
    .hero-tagline { font-size: 1.4rem; letter-spacing: 2px; padding: 0 1rem; text-align: center; }
    .hero-cta { flex-direction: column; align-items: center; gap: 1rem; margin-top: 2rem; }
    .btn { padding: 0.85rem 2rem; font-size: 0.75rem; width: 100%; max-width: 260px; text-align: center; }

    /* Rings - scale down so they don't cause overflow */
    .ring:nth-child(1) { width: 300px; height: 300px; }
    .ring:nth-child(2) { width: 450px; height: 450px; }
    .ring:nth-child(3) { width: 600px; height: 600px; }

    /* Sections */
    section { padding: 4rem 1.5rem !important; }
    .section-title { font-size: clamp(2rem, 8vw, 3rem); }

    /* Albums */
    .albums-grid { grid-template-columns: 1fr; gap: 1.5rem; }

    /* Shows */
    .tab-btn { font-size: 1.2rem; padding: 0.75rem 1.5rem 0.75rem 0; }
    .tour-item { grid-template-columns: 65px 1fr; grid-template-rows: auto auto; gap: 0.5rem 1rem; padding: 1.2rem 0; align-items: start; }
    .tour-ticket-btn, .past-label { display: none; }
    .tour-item .tour-date-box { grid-column: 1; grid-row: 1; align-self: start; }
    .tour-item > div:nth-child(2) { grid-column: 2; grid-row: 1; align-self: start; }
    .tour-item .lineup-btn { grid-column: 1; grid-row: 2; justify-self: stretch; font-size: 0.55rem; padding: 3px 4px; text-align: center; }
    .tour-venue { font-size: 0.95rem; }
    .tour-city { font-size: 0.75rem; }

    /* Contact form */
    .form-row { grid-template-columns: 1fr; }

    /* Social links */
    .social-links { flex-wrap: wrap; gap: 1.2rem; }
    .social-link { font-size: 0.7rem; }

    /* Footer */
    footer { flex-direction: column; gap: 1rem; text-align: center; padding: 1.5rem 1.2rem; }
  }

  /* Lineup button */
  .lineup-btn {
    background: #3b1f0a;
    border: 2px solid #3b1f0a;
    color: #f0e6c8;
    font-family: 'Special Elite', cursive;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 18px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
    display: inline-block;
    align-self: center;
  }
  .lineup-btn:hover { background: #5a3015; border-color: #5a3015; color: #f0e6c8; }

  /* Lineup Modal */
  #lineup-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  #lineup-modal.open { display: flex; }
  #lineup-modal .modal-box {
    background: #1a1008;
    border: 1px solid #b8860b;
    color: #f0e6c8;
    padding: 2rem 2.5rem;
    min-width: 300px;
    max-width: 460px;
    width: 90%;
    position: relative;
    border-radius: 3px;
  }
  #lineup-modal h3 {
    color: #c9a84c;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    text-align: center;
  }
  #lineup-modal .modal-date {
    text-align: center;
    font-family: 'Special Elite', cursive;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #b8860b;
    margin-bottom: 1.4rem;
  }
  #lineup-modal .lineup-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(184,134,11,0.2);
    font-size: 0.92rem;
  }
  #lineup-modal .lineup-row:last-child { border-bottom: none; }
  #lineup-modal .lineup-name { font-family: 'Playfair Display', serif; }
  #lineup-modal .lineup-role { color: #b8860b; font-family: 'Special Elite', cursive; font-size: 0.75rem; letter-spacing: 1px; }
  #lineup-modal .close-btn {
    position: absolute;
    top: 10px; right: 14px;
    background: none; border: none;
    color: #b8860b; font-size: 1.3rem;
    cursor: pointer; line-height: 1;
  }


  @media (max-width: 600px) {
    .tour-item {
      grid-template-columns: 70px 1fr;
      grid-template-rows: auto auto;
      align-items: start;
    }
    .tour-item .tour-date-box {
      grid-row: 1 / 3;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .tour-item .lineup-btn {
      grid-column: 2;
      justify-self: start;
      margin-top: 0.2rem;
      font-size: 0.55rem;
      padding: 16px 8px;
    }
    .tour-item > div:not(.tour-date-box) {
      padding-top: 0.4rem;
    }
    .tour-item .past-label {
      grid-column: 1 / -1;
      text-align: right;
      margin-top: 0.2rem;
    }
  }
</style>
</head>

  </ul>
</nav>

<script>
  function switchTab(tab, btn) {
    document.querySelectorAll('.shows-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    btn.classList.add('active');
  }

  // ── SHOW DATA ──────────────────────────────────────────────
  // date: 'YYYY-MM-DD', lineupId: optional (shows Lineup btn in Previous)
  const ALL_SHOWS = [
    { date: '2025-11-28', venue: 'Poe Mill Music Hall',           city: 'Greenville, SC', lineupId: 'poemill-2025-11-28' },
    { date: '2025-10-25', venue: 'Corey James Memorial Good Time Benefit', city: 'Greer, SC', lineupId: 'corey-james-2025-10-25' },
    { date: '2025-10-04', venue: 'Artistry Workshops & Gallery',  city: 'Greenville, SC', lineupId: 'artistry-2025-10-04' },
    { date: '2025-09-14', venue: 'Smileys on the Roxx',           city: 'Greenville, SC', lineupId: 'smileys-2025-09-14' },
  ];

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const SHOWS_PER_PAGE = 4;
  const paginationState = {};

  function buildShowItem(show, isPast) {
    const [year, month, day] = show.date.split('-');
    const item = document.createElement('div');
    item.className = 'tour-item' + (isPast ? ' past' : '');

    const dateBox = `<div class="tour-date-box">
      <p class="tour-month">${MONTHS[parseInt(month)-1]}</p>
      <p class="tour-day">${day}</p>
      <span class="tour-year">${year}</span>
    </div>`;

    const info = `<div>
      <p class="tour-venue">${show.venue}</p>
      <p class="tour-city">${show.city}</p>
    </div>`;

    const action = isPast && show.lineupId
      ? `<button class="lineup-btn" onclick="showLineup('${show.lineupId}')">Lineup</button>`
      : '';

    item.innerHTML = dateBox + info + action;
    return item;
  }

  function renderShows() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const upcoming = ALL_SHOWS
      .filter(s => new Date(s.date + 'T00:00:00') >= today)
      .sort((a, b) => a.date.localeCompare(b.date));

    const previous = ALL_SHOWS
      .filter(s => new Date(s.date + 'T00:00:00') < today)
      .sort((a, b) => b.date.localeCompare(a.date));

    const upcomingList = document.getElementById('list-upcoming');
    const previousList = document.getElementById('list-previous');
    upcomingList.innerHTML = '';
    previousList.innerHTML = '';

    if (upcoming.length === 0) {
      document.getElementById('no-upcoming').style.display = '';
    } else {
      upcoming.forEach(s => upcomingList.appendChild(buildShowItem(s, false)));
    }

    if (previous.length === 0) {
      document.getElementById('no-previous').style.display = '';
    } else {
      previous.forEach(s => previousList.appendChild(buildShowItem(s, true)));
    }

    initPagination('upcoming');
    initPagination('previous');
  }

  function initPagination(panelId) {
    const list = document.getElementById('list-' + panelId);
    if (!list) return;
    const items = Array.from(list.querySelectorAll('.tour-item'));
    if (items.length === 0) return;
    paginationState[panelId] = 1;
    renderPage(panelId, items);
  }

  function renderPage(panelId, items) {
    const page = paginationState[panelId];
    const totalPages = Math.ceil(items.length / SHOWS_PER_PAGE);
    const start = (page - 1) * SHOWS_PER_PAGE;
    const end = start + SHOWS_PER_PAGE;
    items.forEach((item, i) => {
      item.style.display = (i >= start && i < end) ? '' : 'none';
    });
    const paginationEl = document.getElementById('pagination-' + panelId);
    if (!paginationEl) return;
    paginationEl.innerHTML = '';
    if (totalPages <= 1) return;
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === page ? ' active' : '');
      btn.textContent = i;
      btn.addEventListener('click', () => {
        paginationState[panelId] = i;
        renderPage(panelId, items);
        const tabsEl = document.getElementById('shows-tabs-anchor');
        const offset = tabsEl.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top: offset, behavior: 'smooth' });
      });
      paginationEl.appendChild(btn);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderShows();
  });
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(el => { if (el.isIntersecting) el.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  reveals.forEach(el => observer.observe(el));

  function loadVideo() {
    var facade = document.getElementById('yt-facade');
    var iframe = document.getElementById('yt-iframe');
    facade.style.display = 'none';
    iframe.src = 'https://www.youtube.com/embed/AJsZSgBB1mw?autoplay=1&rel=0';
    document.getElementById('yt-iframe-wrap').style.display = 'block';
    iframe.style.display = 'block';
  }


  // Ã¢ÂÂÃ¢ÂÂ Lineup popup Ã¢ÂÂÃ¢ÂÂ
  let lineupData = null;
  (async () => {
    try {
      const res = await fetch('/lineups.json');
      lineupData = await res.json();
    } catch(e) { console.warn('Could not load lineups.json', e); }
  })();

  function showLineup(id) {
    const noData = !lineupData || !lineupData.shows.find(s => s.id === id);
    if (noData) {
      document.getElementById('lineup-title').textContent = 'Lineup coming soon.';
      document.getElementById('lineup-date').textContent = '';
      document.getElementById('lineup-list').innerHTML = '';
      document.getElementById('lineup-modal').classList.add('open');
      return;
    }
    const show = lineupData.shows.find(s => s.id === id);
    document.getElementById('lineup-title').textContent = show.venue;
    document.getElementById('lineup-date').textContent =
      show.date.month + ' ' + show.date.day + ', ' + show.date.year + ' - ' + show.city;
    document.getElementById('lineup-list').innerHTML = show.lineup
      .map(m => '<div class="lineup-row"><span class="lineup-name">' + m.name + '</span><span class="lineup-role">' + m.role + '</span></div>')
      .join('');
    document.getElementById('lineup-modal').classList.add('open');
  }

  document.addEventListener('click', function(e) {
    const modal = document.getElementById('lineup-modal');
    if (modal && e.target === modal) modal.classList.remove('open');
  });

</script>

<!-- Lineup Modal -->
<div id="lineup-modal">
  <div class="modal-box">
    <button class="close-btn" onclick="document.getElementById('lineup-modal').classList.remove('open')">X</button>
    <h3 id="lineup-title"></h3>
    <p class="modal-date" id="lineup-date"></p>
    <div id="lineup-list"></div>
  </div>
</div>

</body>
