name: Validate JSON

on:
  push:
    branches:
      - main
    paths:
      - '*.json'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (JSON files)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout tests branch (schemas + validator)
        uses: actions/checkout@v4
        with:
          ref: tests
          path: tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate lineups.json
        run: |
          python tests/validate_json.py \
            main/lineups.json \
            tests/lineups_schema.json

      - name: Validate setlists.json
        run: |
          python tests/validate_json.py \
            main/setlists.json \
            tests/setlists_schema.json
