name: Selenium Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t cosmichawg-tests .

      - name: Run tests
        # --rm means the container deletes itself when done.
        # SITE_DIR=/app points the test at the container's own copy of the
        # site files — your real shows.json / lineups.json / setlists.json
        # on the repo are never touched.
        run: |
          docker run --rm \
            -e SITE_DIR=/app \
            -e HEADLESS=true \
            cosmichawg-tests
        # If the test exits 1, this step fails → the whole workflow fails →
        # GitHub marks the commit red and subsequent deploy steps are skipped.
